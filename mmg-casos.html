<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --lima:#DCFE6F;
  --metrix:#307FE2;
  --forma:#FE5000;
  --moov:#E0004D;
  --vou:#DCFE6F;
  --bg:#FFFFFF;
  --bg2:#F7F7F5;
  --border:#E5E5E2;
  --border2:#D0D0CC;
  --text:#0A0A0A;
  --text2:#555550;
  --text3:#999990;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
/* TOPBAR */
.topbar{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1.5px solid var(--text);padding-bottom:12px;margin-bottom:1.75rem}
.brand-word{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.1em;color:var(--text);line-height:1}
.brand-sub{font-size:10px;letter-spacing:0.18em;color:var(--text2);text-transform:uppercase;margin-top:3px}
.count-pill{background:var(--lima);color:#000;font-size:11px;font-weight:500;padding:4px 13px;border-radius:99px}
/* FILTERS */
.filter-block{margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.filter-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding-top:7px;min-width:60px;flex-shrink:0}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:500;padding:5px 13px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.12s;line-height:1.2}
.chip:hover{border-color:var(--text);color:var(--text)}
/* SEARCH */
.search-row{margin:14px 0 1.5rem;position:relative}
.search-row svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;pointer-events:none;color:var(--text3)}
.search-row input{width:100%;padding:9px 14px 9px 36px;font-size:13px;font-family:'DM Sans',sans-serif;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);outline:none}
.search-row input:focus{border-color:var(--text)}
/* CASES */
.cases{display:flex;flex-direction:column;gap:6px}
.case-card{border:0.5px solid var(--border);border-radius:10px;background:var(--bg);overflow:hidden;transition:border-color 0.12s}
.case-card:hover{border-color:var(--border2)}
.case-main{display:grid;grid-template-columns:4px 1fr auto;align-items:center;gap:14px;padding:13px 16px;cursor:pointer}
.accent{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0}
.a-Metrix{background:var(--metrix)}.a-Forma{background:var(--forma)}.a-Moov{background:var(--moov)}.a-Vou{background:var(--vou)}
.case-body{min-width:0}
.case-client{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:7px;line-height:1.1}
.case-name{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap}
.t-Metrix{background:#DCEEFF;color:#0C447C}.t-Forma{background:#FDECD8;color:#8A3A04}.t-Moov{background:#FFD6E3;color:#7A0025}.t-Vou{background:#EEFAD0;color:#3D6500}
.t-svc{background:var(--bg2);color:var(--text2)}
.case-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn-res{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:5px 11px;border-radius:6px;border:0.5px solid var(--border2);color:var(--text2);text-decoration:none;background:transparent;cursor:pointer;transition:all 0.12s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.btn-res:hover{background:var(--lima);border-color:var(--lima);color:#000}
.btn-ppt{border-color:var(--text);color:var(--text)}
.chev{width:16px;height:16px;flex-shrink:0;color:var(--text3);transition:transform 0.15s}
.chev.open{transform:rotate(180deg)}
/* DETAIL */
.case-detail{display:none;padding:14px 16px 18px 34px;border-top:0.5px solid var(--border);background:var(--bg2)}
.case-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;margin-bottom:14px}
.dl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.dv{font-size:13px;color:var(--text)}
.detail-links{display:flex;gap:8px;flex-wrap:wrap}
.lnk{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;text-decoration:none;border:0.5px solid var(--border2);color:var(--text);background:var(--bg);cursor:pointer;transition:all 0.12s;font-family:'DM Sans',sans-serif}
.lnk:hover{background:var(--lima);border-color:var(--lima);color:#000}
.lnk-ppt{border-color:var(--text)}
.no-res-txt{font-size:12px;color:var(--text3)}
.empty{padding:3rem;text-align:center;font-size:13px;color:var(--text2)}
/* NOTE */
.ppt-note{background:#FFFDE7;border:0.5px solid #F0C040;border-radius:6px;padding:8px 12px;font-size:11px;color:#7A5800;margin-bottom:1.25rem}
</style>
</head>

const AREA_COLORS={Metrix:'#307FE2',Forma:'#FE5000',Moov:'#E0004D',Vou:'#DCFE6F'};
const AREA_TEXT={Metrix:'#fff',Forma:'#fff',Moov:'#fff',Vou:'#000'};
const SEL={area:new Set(),ind:new Set(),svc:new Set()};
let openIdx=null;

function toggleChip(el){
  const group=el.dataset.group, val=el.dataset.val, set=SEL[group];
  if(val===''){ set.clear(); document.querySelectorAll('[data-group="'+group+'"]').forEach(c=>resetChip(c,group,c.dataset.val)); }
  else{
    document.querySelector('[data-group="'+group+'"][data-val=""]').style.cssText='';
    if(set.has(val)){ set.delete(val); resetChip(el,group,val); }
    else{ set.add(val); activateChip(el,group,val); }
  }
  openIdx=null; render();
}

function activateChip(el,group,val){
  if(group==='area'&&AREA_COLORS[val]){
    el.style.background=AREA_COLORS[val];
    el.style.color=AREA_TEXT[val];
    el.style.borderColor=AREA_COLORS[val];
  }else{
    el.style.background='#000';
    el.style.color='#fff';
    el.style.borderColor='#000';
  }
}

function resetChip(el){
  el.style.background='';
  el.style.color='';
  el.style.borderColor='';
}

const LOCK='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#E0004D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" title="No apto para RRSS"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
const CHEV='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
const PPT_I='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>';
const BLOG_I='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

function openLink(url){ window.open(url,'_blank'); }

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const list=DATA.filter(d=>{
    if(SEL.area.size&&!SEL.area.has(d.area))return false;
    if(SEL.ind.size&&![...SEL.ind].some(v=>d.industria.toLowerCase().includes(v.toLowerCase())))return false;
    if(SEL.svc.size&&![...SEL.svc].some(v=>d.servicio.toLowerCase().includes(v.toLowerCase())))return false;
    if(q&&!d.nombre.toLowerCase().includes(q)&&!d.cliente.toLowerCase().includes(q)&&!d.industria.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('count-lbl').textContent=list.length+(list.length===1?' caso':' casos');
  const c=document.getElementById('cases');
  if(!list.length){c.innerHTML='<div class="empty">Sin resultados.</div>';return;}
  c.innerHTML=list.map((d,i)=>{
    const open=openIdx===i;
    const hB=d.blog&&d.blog.startsWith('http');
    const hP=d.ppt&&d.ppt.startsWith('http');
    const chevClass='chev'+(open?' open':'');
    return `<div class="case-card">
      <div class="case-main" onclick="tog(${i})">
        <div class="accent a-${d.area}"></div>
        <div class="case-body">
          <div class="case-client">${d.cliente.toUpperCase()}${d.privado?'&nbsp;'+LOCK:''}</div>
          <div class="case-name">${d.nombre}</div>
          <div class="tags">
            <span class="tag t-${d.area}">${d.area}</span>
            <span class="tag t-svc">${d.servicio}</span>
          </div>
        </div>
        <div class="case-right">
          ${hP?`<button class="btn-res btn-ppt" onclick="event.stopPropagation();openLink('${d.ppt}')">${PPT_I}One page</button>`:''}
          ${hB?`<button class="btn-res" onclick="event.stopPropagation();openLink('${d.blog}')">${BLOG_I}Blog</button>`:''}
          <div class="${chevClass}">${CHEV}</div>
        </div>
      </div>
      <div class="case-detail${open?' open':''}">
        <div class="detail-grid">
          <div><div class="dl">Cliente</div><div class="dv">${d.cliente}</div></div>
          <div><div class="dl">Servicio</div><div class="dv">${d.servicio}</div></div>
          <div><div class="dl">Industria</div><div class="dv">${d.industria}</div></div>
          <div><div class="dl">Publicación</div><div class="dv">${d.fecha||'—'}</div></div>
        </div>
        <div class="detail-links">
          ${hP?`<button class="lnk lnk-ppt" onclick="openLink('${d.ppt}')">${PPT_I}Ver one page</button>`:''}
          ${hB?`<button class="lnk" onclick="openLink('${d.blog}')">${BLOG_I}Ver artículo</button>`:''}
          ${!hB&&!hP?'<span class="no-res-txt">Sin recursos disponibles aún.</span>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function tog(i){openIdx=openIdx===i?null:i;render();}
render();
